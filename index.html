<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arabic Quiz — Lëtzebuergesch → Arabic</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <header class="header">
    <h1 class="wordmark">Arabic Quiz</h1>
    <p class="subtitle">Lëtzebuergesch → Arabic, one verb at a time</p>
  </header>

  <section class="session-stats" id="session-stats">
    <div class="stat">
      <span class="stat-value" id="stat-streak">0</span>
      <span class="stat-label">streak</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-accuracy">—</span>
      <span class="stat-label">accuracy</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-total">0</span>
      <span class="stat-label">answered</span>
    </div>
  </section>

  <main class="quiz-card" id="quiz-card">
    <p class="level-label" id="level-label"></p>
    <p class="level-up-message" id="level-up-message" hidden></p>
    <p class="gloss" id="gloss"></p>
    <p class="prompt" id="prompt"></p>
    <form id="answer-form" autocomplete="off">
      <input
        id="answer-input"
        type="text"
        inputmode="latin"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        placeholder="arabic transliteration"
      />
      <button type="submit">Check</button>
    </form>
    <p class="feedback" id="feedback"></p>
  </main>

  <section class="export-section" id="export-section" hidden>
    <h2 class="export-heading">New milestones</h2>
    <p class="export-copy-text">
      Paste this into <code>progress-log.json</code> and commit it to keep a
      record of your progress.
    </p>
    <textarea id="export-json" class="export-json" readonly rows="6"></textarea>
    <div class="export-actions">
      <button id="export-copy" type="button">Copy</button>
      <button id="export-mark-done" type="button" class="ghost">I've saved this</button>
    </div>
  </section>

</div>

<script src="data.js"></script>
<script src="matching.js"></script>
<script src="quiz.js"></script>
</body>
</html>
