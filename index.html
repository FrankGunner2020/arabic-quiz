<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arabic Quiz — Lëtzebuergesch → Arabic</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <header class="header">
    <h1 class="wordmark">Arabic Quiz</h1>
    <p class="subtitle">Lëtzebuergesch → Arabic, one verb at a time</p>
    <p class="practice-line">Day <span id="practice-day">1</span>
      <span class="practice-detail">· <span id="practice-count">0</span> answered today</span></p>
    <div class="header-actions">
      <button class="home-btn" id="home-btn" type="button" hidden>Home</button>
      <button class="word-list-btn" id="word-list-btn" type="button">Word list</button>
    </div>
  </header>

  <div id="home-view">
    <button class="level-card" type="button" id="level-card-1" data-level="1">
      <span class="level-card-spine" aria-hidden="true"></span>
      <span class="level-card-body">
        <span class="level-card-top">
          <span class="level-card-title">Level 1 — Infinitives</span>
          <span class="level-card-fraction" id="level-card-fraction-1"></span>
        </span>
        <span class="level-card-status" id="level-card-status-1"></span>
        <span class="level-progress-track" id="level-progress-track-1">
          <span class="level-progress-fill" id="level-progress-fill-1"></span>
        </span>
        <span class="level-card-note" id="level-card-note-1" hidden></span>
      </span>
    </button>

    <button class="level-card" type="button" id="level-card-2" data-level="2">
      <span class="level-card-spine" aria-hidden="true"></span>
      <span class="level-card-body">
        <span class="level-card-top">
          <span class="level-card-title">Level 2 — Ana, Anta, Huwa, Hiya</span>
          <span class="level-card-fraction" id="level-card-fraction-2"></span>
        </span>
        <span class="level-card-status" id="level-card-status-2"></span>
        <span class="level-progress-track" id="level-progress-track-2">
          <span class="level-progress-fill" id="level-progress-fill-2"></span>
        </span>
        <span class="level-card-note" id="level-card-note-2" hidden></span>
      </span>
    </button>

    <button class="level-card" type="button" id="level-card-3" data-level="3">
      <span class="level-card-spine" aria-hidden="true"></span>
      <span class="level-card-body">
        <span class="level-card-top">
          <span class="level-card-title">Level 3 — Nahnu, Antum, Hum</span>
          <span class="level-card-fraction" id="level-card-fraction-3"></span>
        </span>
        <span class="level-card-status" id="level-card-status-3"></span>
        <span class="level-progress-track" id="level-progress-track-3">
          <span class="level-progress-fill" id="level-progress-fill-3"></span>
        </span>
        <span class="level-card-note" id="level-card-note-3" hidden></span>
      </span>
    </button>

    <button class="level-card" type="button" id="phrases-card" data-level="phrases">
      <span class="level-card-spine" aria-hidden="true"></span>
      <span class="level-card-body">
        <span class="level-card-top">
          <span class="level-card-title">Phrases</span>
          <span class="level-card-fraction" id="phrases-card-fraction"></span>
        </span>
        <span class="level-card-status" id="phrases-card-status"></span>
        <span class="level-progress-track" id="phrases-progress-track">
          <span class="level-progress-fill" id="phrases-progress-fill"></span>
        </span>
      </span>
    </button>
  </div>

  <div id="quiz-view-root" hidden>

    <section class="session-stats" id="session-stats">
      <div class="stat">
        <span class="stat-value" id="stat-streak">0</span>
        <span class="stat-label">streak</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-accuracy">—</span>
        <span class="stat-label">accuracy</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">answered</span>
      </div>
    </section>

    <main class="quiz-shell" id="quiz-card">
      <div class="quiz-panel">
        <div class="q-pills">
          <span class="pill pill-level" id="pill-level"></span>
          <span class="pill pill-pronoun" id="pill-pronoun" hidden></span>
        </div>

        <div id="question-view">
          <div class="prompt-plate">
            <p class="gloss" id="gloss"></p>
            <p class="prompt" id="prompt"></p>
          </div>
          <form id="answer-form" autocomplete="off">
            <input
              id="answer-input"
              type="text"
              inputmode="latin"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              placeholder="arabic transliteration"
            />
            <button type="submit">Check</button>
          </form>
          <p class="progress-counter" id="progress-counter" hidden></p>
          <p class="feedback" id="feedback"></p>
        </div>

        <div class="result-view" id="result-view" hidden>
          <div class="result-plain" id="result-plain">
            <p class="result-score" id="result-score"></p>
            <p class="result-message" id="result-message"></p>
            <button class="result-action" id="result-action" type="button"></button>
          </div>

          <div class="milestone" id="milestone-view" hidden>
            <div class="milestone-frame">
              <p class="milestone-kicker" id="milestone-kicker"></p>
              <p class="milestone-score" id="milestone-score"></p>
              <p class="milestone-sub" id="milestone-sub"></p>
              <div class="milestone-dots" id="milestone-dots"></div>
              <p class="milestone-line" id="milestone-line"></p>
              <button class="milestone-action" id="milestone-action" type="button"></button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <section class="export-section" id="export-section" hidden>
      <h2 class="export-heading">New milestones</h2>
      <p class="export-copy-text">
        Paste this into <code>progress-log.json</code> and commit it to keep a
        record of your progress.
      </p>
      <textarea id="export-json" class="export-json" readonly rows="6"></textarea>
      <div class="export-actions">
        <button id="export-copy" type="button">Copy</button>
        <button id="export-mark-done" type="button" class="ghost">I've saved this</button>
      </div>
    </section>

  </div>

  <div id="phrases-view-root" hidden>

    <section class="session-stats" id="phrases-session-stats">
      <div class="stat">
        <span class="stat-value" id="phrase-stat-streak">0</span>
        <span class="stat-label">streak</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="phrase-stat-accuracy">—</span>
        <span class="stat-label">accuracy</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="phrase-stat-total">0</span>
        <span class="stat-label">answered</span>
      </div>
    </section>

    <main class="quiz-shell" id="phrases-card-quiz" data-level="phrases">
      <div class="quiz-panel">
        <div class="q-pills">
          <span class="pill pill-level">Phrases</span>
        </div>

        <div class="prompt-plate">
          <p class="gloss" id="phrase-gloss"></p>
          <p class="prompt" id="phrase-prompt"></p>
        </div>

        <div class="phrase-options" id="phrase-options"></div>

        <p class="feedback" id="phrase-feedback"></p>

        <button class="phrase-next" id="phrase-next" type="button" hidden>Next →</button>
      </div>
    </main>

  </div>

  <div class="modal-overlay" id="word-list-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="word-list-title">Word list</h2>
        <button class="modal-close" id="word-list-close" type="button">Close</button>
      </div>
      <div class="modal-body" id="word-list-body"></div>
    </div>
  </div>

</div>

<script src="matching.js"></script>
<script src="data.js"></script>
<script src="quiz.js"></script>
</body>
</html>
